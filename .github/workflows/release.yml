name: Release Windows

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows release artifact
    runs-on: windows-latest
    env:
      FFMPEG_RELEASE_REPO: BtbN/FFmpeg-Builds
      FFMPEG_ASSET_PATTERN: ffmpeg-master-latest-win64-gpl.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked

      - name: Lint
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build
        run: cargo build --release --locked

      - name: Resolve MSI version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^(?:v)?(\d+)\.(\d+)\.(\d+)$') {
            throw "Release tag '$tag' is not a valid MSI version. Use vMAJOR.MINOR.PATCH or MAJOR.MINOR.PATCH."
          }
          "MSI_VERSION=$($Matches[1]).$($Matches[2]).$($Matches[3])" >> $env:GITHUB_ENV

      - name: Download FFmpeg
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          New-Item -ItemType Directory -Force ffmpeg-download | Out-Null
          gh release download `
            --repo $env:FFMPEG_RELEASE_REPO `
            --pattern $env:FFMPEG_ASSET_PATTERN `
            --dir ffmpeg-download `
            --clobber

          $ffmpegArchive = Join-Path ffmpeg-download $env:FFMPEG_ASSET_PATTERN
          if (-not (Test-Path $ffmpegArchive)) {
            throw "FFmpeg archive was not downloaded: $ffmpegArchive"
          }

          Expand-Archive `
            -Path $ffmpegArchive `
            -DestinationPath ffmpeg-download/extracted `
            -Force

      - name: Stage release payload
        shell: pwsh
        run: |
          $dist = "dist/unrelic-windows-x86_64"
          New-Item -ItemType Directory -Force $dist | Out-Null

          Copy-Item target/release/unrelic.exe $dist/
          Copy-Item installer/unrelic-context.ps1 $dist/
          Copy-Item README.md $dist/
          Copy-Item LICENSE $dist/

          $ffmpeg = Get-ChildItem ffmpeg-download/extracted -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem ffmpeg-download/extracted -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if ($null -eq $ffmpeg -or $null -eq $ffprobe) {
            throw "Could not find ffmpeg.exe and ffprobe.exe in the downloaded FFmpeg archive."
          }
          Copy-Item $ffmpeg.FullName $dist/
          Copy-Item $ffprobe.FullName $dist/

          $licenseDir = Join-Path $dist "ffmpeg-licenses"
          New-Item -ItemType Directory -Force $licenseDir | Out-Null
          Get-ChildItem ffmpeg-download/extracted -Recurse -File -Include LICENSE*,COPYING*,README* |
            Copy-Item -Destination $licenseDir -Force

      - name: Package portable zip
        shell: pwsh
        run: |
          $dist = "dist/unrelic-windows-x86_64"
          Compress-Archive `
            -Path "$dist/*" `
            -DestinationPath "dist/unrelic-windows-x86_64.zip" `
            -Force

      - name: Build MSI installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $payload = (Resolve-Path "dist/unrelic-windows-x86_64").Path
          & ./installer/generate-license-fragment.ps1 `
            -PayloadDir "$payload" `
            -OutputPath "installer/FfmpegLicenses.Generated.wxs"
          dotnet build installer/unrelic.wixproj `
            --configuration Release `
            --property:PayloadDir="$payload" `
            --property:ProductVersion="$env:MSI_VERSION" `
            --property:OutputPath="../dist/wix/"
          Copy-Item dist/wix/unrelic-windows-x86_64.msi dist/unrelic-windows-x86_64.msi -Force

      - name: Smoke test MSI installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          $msi = (Resolve-Path "dist/unrelic-windows-x86_64.msi").Path
          $installDir = Join-Path $env:LOCALAPPDATA "Programs\unrelic"

          $install = Start-Process msiexec.exe -Wait -PassThru -ArgumentList "/i `"$msi`" /qn /norestart"
          if ($install.ExitCode -ne 0) {
            throw "MSI install failed with exit code $($install.ExitCode)."
          }

          $expectedFiles = @("unrelic.exe", "ffmpeg.exe", "ffprobe.exe", "unrelic-context.ps1", "README.md", "LICENSE")
          foreach ($file in $expectedFiles) {
            $path = Join-Path $installDir $file
            if (-not (Test-Path $path)) {
              throw "Installed file is missing: $path"
            }
          }

          & (Join-Path $installDir "unrelic.exe") --version
          if ($LASTEXITCODE -ne 0) {
            throw "Installed unrelic.exe --version failed."
          }

          $normalizedInstallDir = $installDir.TrimEnd('\')
          $userPathEntries = [Environment]::GetEnvironmentVariable("PATH", "User") -split ';' |
            ForEach-Object { $_.TrimEnd('\') }
          if ($userPathEntries -notcontains $normalizedInstallDir) {
            throw "Installer did not add $installDir to the user PATH."
          }

          $registryChecks = @(
            @{ Key = "Registry::HKEY_CURRENT_USER\Software\Classes\SystemFileAssociations\.mpg\shell\unrelic"; Argument = "%1" },
            @{ Key = "Registry::HKEY_CURRENT_USER\Software\Classes\SystemFileAssociations\.mpeg\shell\unrelic"; Argument = "%1" },
            @{ Key = "Registry::HKEY_CURRENT_USER\Software\Classes\Directory\shell\unrelic"; Argument = "%1" },
            @{ Key = "Registry::HKEY_CURRENT_USER\Software\Classes\Directory\Background\shell\unrelic"; Argument = "%V" }
          )
          $contextScript = Join-Path $installDir "unrelic-context.ps1"
          foreach ($check in $registryChecks) {
            if (-not (Test-Path $check.Key)) {
              throw "Context menu registry key is missing: $($check.Key)"
            }

            $label = (Get-Item -Path $check.Key).GetValue("")
            $verb = Get-ItemProperty -Path $check.Key
            if ($label -ne "Convert with unrelic") {
              throw "Context menu label is wrong for $($check.Key)."
            }
            if ($verb.Icon -ne (Join-Path $installDir "unrelic.exe")) {
              throw "Context menu icon is wrong for $($check.Key)."
            }
            if ($verb.MultiSelectModel -ne "Single") {
              throw "Context menu MultiSelectModel is wrong for $($check.Key)."
            }

            $commandKey = Join-Path $check.Key "command"
            if (-not (Test-Path $commandKey)) {
              throw "Context menu command key is missing: $commandKey"
            }

            $command = (Get-Item -Path $commandKey).GetValue("")
            if (-not $command.Contains($contextScript) -or -not $command.Contains($check.Argument)) {
              throw "Context menu command is wrong for $commandKey`: $command"
            }
          }

          $uninstall = Start-Process msiexec.exe -Wait -PassThru -ArgumentList "/x `"$msi`" /qn /norestart"
          if ($uninstall.ExitCode -ne 0) {
            throw "MSI uninstall failed with exit code $($uninstall.ExitCode)."
          }

          if (Test-Path $installDir) {
            throw "Install directory still exists after uninstall: $installDir"
          }

          $userPathEntries = [Environment]::GetEnvironmentVariable("PATH", "User") -split ';' |
            ForEach-Object { $_.TrimEnd('\') }
          if ($userPathEntries -contains $normalizedInstallDir) {
            throw "Installer did not remove $installDir from the user PATH."
          }

          foreach ($check in $registryChecks) {
            if (Test-Path $check.Key) {
              throw "Context menu registry key still exists after uninstall: $($check.Key)"
            }
          }

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          gh release upload $env:GITHUB_REF_NAME dist/unrelic-windows-x86_64.zip dist/unrelic-windows-x86_64.msi --clobber
